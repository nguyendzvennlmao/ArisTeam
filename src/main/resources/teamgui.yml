gui:
  main:
    title: "&8&lTEAM MANAGER"
    size: 27
    items:
      ec:
        slot: 11
        material: ENDER_CHEST
        name: "&a&lTEAM EC"
        lore:
          - "&7Open team ender chest"
      members:
        slot: 12
        material: PLAYER_HEAD
        name: "&b&lTEAM MEMBERS"
        lore:
          - "&7View all team members"
      pvp:
        slot: 13
        material: IRON_SWORD
        name: "&c&lPVP TOGGLE"
        lore:
          - "&7Status: %pvp_status%"
          - "&7Click to toggle"
      home:
        slot: 15
        material: COMPASS
        name: "&e&lTEAM HOME"
        lore:
          - "&7Teleport to team home"
      sethome:
        slot: 14
        material: BELL
        name: "&6&lSET HOME"
        lore:
          - "&7Set team home location"
  
  members:
    title: "&8&lTEAM MEMBERS"
    size: 54
  
  confirm_create:
    title: "&8&lCONFIRM CREATE TEAM"
    size: 27
    items:
      confirm:
        slot: 15
        material: LIME_STAINED_GLASS_PANE
        name: "&a&lCONFIRM"
        lore:
          - "&7Create team: &f%teamname%"
      cancel:
        slot: 11
        material: RED_STAINED_GLASS_PANE
        name: "&c&lCANCEL"
        lore:
          - "&7Cancel team creation"
  
  confirm_leave:
    title: "&8&lCONFIRM LEAVE TEAM"
    size: 27
    items:
      confirm:
        slot: 15
        material: LIME_STAINED_GLASS_PANE
        name: "&a&lCONFIRM"
        lore:
          - "&7You will leave team &e%team%"
          - "&cThis action cannot be undone!"
      cancel:
        slot: 11
        material: RED_STAINED_GLASS_PANE
        name: "&c&lCANCEL"
        lore:
          - "&7Cancel leave team"
  
  confirm_disband:
    title: "&8&lCONFIRM DISBAND TEAM"
    size: 27
    items:
      confirm:
        slot: 15
        material: LIME_STAINED_GLASS_PANE
        name: "&a&lCONFIRM"
        lore:
          - "&c&lDELETE TEAM &e%team%"
          - "&cAll members will be removed!"
          - "&cThis action cannot be undone!"
      cancel:
        slot: 11
        material: RED_STAINED_GLASS_PANE
        name: "&c&lCANCEL"
        lore:
          - "&7Cancel disband team"
  
  confirm_kick:
    title: "&8&lCONFIRM KICK MEMBER"
    size: 27
    items:
      confirm:
        slot: 15
        material: LIME_STAINED_GLASS_PANE
        name: "&a&lCONFIRM"
        lore:
          - "&7Kick member: &f%player%"
          - "&cThis action cannot be undone!"
      cancel:
        slot: 11
        material: RED_STAINED_GLASS_PANE
        name: "&c&lCANCEL"
        lore:
          - "&7Cancel kick member"
      player_head:
        slot: 13
        material: PLAYER_HEAD
        name: "&f%player%"
        lore:
          - "&7Member to be kicked"
